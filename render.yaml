services:
  # ── Backend (Flask) ──────────────────────────────────────────────────────
  - type: web
    name: family-hub-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: MONGO_URI
        sync: false          # תמלא ידנית ב-Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render ייצר אוטומטית
      - key: FRONTEND_URL
        sync: false          # תמלא אחרי שתיצור את ה-frontend service
      - key: UPLOAD_FOLDER
        value: static/uploads
      - key: PYTHON_VERSION
        value: 3.11.9

  # ── Frontend (React/Vite) ────────────────────────────────────────────────
  - type: web
    name: family-hub-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # תמלא עם ה-URL של ה-backend לאחר יצירתו
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
